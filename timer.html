<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Timer</title>
    <style>
        :root {
            --bg-color: rgba(0, 0, 0, 0); 
            --accent-1: #ff512f;
            --accent-2: #dd2476;
            --text-glow: #ffffff;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* เพิ่ม cursor เพื่อให้รู้ว่าคลิกได้ */
            cursor: pointer; 
        }

        #timer-container {
            position: relative;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 60px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #timer {
            /* ปรับลดขนาดลงเล็กน้อยจาก 140px เป็น 110px เพื่อให้เลข 02:00:00 ไม่ล้น */
            font-size: 110px; 
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(180deg, #fff 30%, #ccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 81, 47, 0.8));
            line-height: 1.1;
            letter-spacing: -2px;
        }

        .glow-bar {
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-1), var(--accent-2), transparent);
            margin-top: 10px;
            border-radius: 2px;
            box-shadow: 0 0 15px var(--accent-2);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scaleX(0.9); }
            50% { opacity: 1; transform: scaleX(1); }
        }
    </style>
</head>
<body>

<div id="timer-container">
    <div id="timer">02:00:00</div>
    <div class="glow-bar"></div>
</div>

<script>
    let lastTime = -1;

    function formatTime(sec) {
        if (sec < 0) sec = 0;
        let h = Math.floor(sec / 3600);
        let m = Math.floor((sec % 3600) / 60);
        let s = sec % 60;
        const pad = (n) => String(n).padStart(2, '0');
        
        // บังคับแสดง HH:MM:SS เสมอ
        return `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    // --- ส่วนที่เพิ่มเข้ามาเพื่อให้แตะแล้วเวลาเดิน ---
    async function startTimer() {
        try {
            await fetch("/start", { method: "POST" });
            console.log("Sent start command to server");
        } catch (e) {
            console.error("Failed to start:", e);
        }
    }

    // เมื่อคลิกหน้าจอ ให้เรียก startTimer (ทำงานครั้งเดียว)
    document.body.addEventListener("click", () => {
        startTimer();
    }, { once: true });
    // ------------------------------------------

    async function fetchTime() {
        try {
            const res = await fetch("/time");
            if (!res.ok) throw new Error("Network error");
            const data = await res.json();
            
            if (data.time !== lastTime) {
                document.getElementById("timer").innerText = formatTime(data.time);
                lastTime = data.time;
                document.getElementById("timer").style.opacity = "1";
            }
        } catch (e) {
            document.getElementById("timer").style.opacity = "0.5";
        }
    }

    setInterval(fetchTime, 1000);
    fetchTime(); 
</script>

</body>
</html>
